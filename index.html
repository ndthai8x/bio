<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nguyễn Đức Thái</title>

<!-- Google Font hỗ trợ tiếng Việt -->
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700&display=swap" rel="stylesheet">

<!-- Icon -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Be Vietnam Pro',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#000000,#0f0c29,#1a0033,#000000);
    background-size:400% 400%;
    animation:gradientBG 20s ease infinite;
    color:white;
    overflow:hidden;
}

@keyframes gradientBG{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

.container{
    text-align:center;
    z-index:2;
}

.avatar-wrapper{
    position:relative;
    width:150px;
    height:150px;
    margin:auto;
}

.avatar-wrapper::before{
    content:"";
    position:absolute;
    width:170px;
    height:170px;
    top:-10px;
    left:-10px;
    border-radius:50%;
    background:conic-gradient(red,orange,yellow,green,cyan,blue,violet,red);
    animation:spin 6s linear infinite;
    filter:blur(8px);
}

@keyframes spin{
    from{transform:rotate(0deg)}
    to{transform:rotate(360deg)}
}

.avatar{
    width:150px;
    height:150px;
    border-radius:50%;
    object-fit:cover;
    position:relative;
    z-index:2;
}

h1{
    margin-top:20px;
    font-size:28px;
    font-weight:700;
}

p{
    color:#aaa;
    margin-bottom:30px;
}

.links{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.links a{
    text-decoration:none;
    color:white;
    padding:12px;
    border-radius:30px;
    position:relative;
    overflow:hidden;
    transition:0.3s;
    font-weight:600;
}

.links a::before{
    content:"";
    position:absolute;
    inset:0;
    border-radius:30px;
    padding:2px;
    background:linear-gradient(45deg,red,orange,yellow,green,cyan,blue,violet,red);
    background-size:400%;
    animation:rainbow 6s linear infinite;
    -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;
    mask-composite:exclude;
}

@keyframes rainbow{
    0%{background-position:0%}
    100%{background-position:400%}
}

.links a:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px cyan;
}

.music-btn{
    margin-top:20px;
    cursor:pointer;
    font-size:14px;
    color:#0ff;
}

canvas{
    position:absolute;
    top:0;
    left:0;
    z-index:1;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="container">

    <div class="avatar-wrapper">
        <img src="https://lh3.googleusercontent.com/pw/AP1GczO7fjONDW5tO3RY9NcP6lp_uiawSYR6lJ5b0_oHx0t-7F5pkmG5ZiGiMuwRcCPVgu_eTfDzvXAjr8u0eLAiQ1nOkb2GffFuLs1bIRRRq24SqPjlCfE7=w2400" class="avatar">
    </div>

    <h1>NGUYỄN ĐỨC THÁI</h1>
    <p>Camera|Vi Tính|Photographer</p>

    <div class="links">
       <a href="tel:0909272412">
            <i class="fas fa-phone"></i> 0909 272 412
        </a>

        <a href="https://facebook.com/thaixalem89" target="_blank">
            <i class="fab fa-facebook-f"></i> Facebook
        </a>

        <a href="https://tiktok.com/@ndthai8x" target="_blank">
            <i class="fab fa-tiktok"></i> TikTok
        </a>

        <a href="https://youtube.com/@0909272412" target="_blank">
            <i class="fab fa-youtube"></i> YouTube
        </a>

        <a href="https://instagram.com/ndthai8x" target="_blank">
            <i class="fab fa-instagram"></i> Instagram
        </a>
    </div>

    <div class="music-btn" onclick="toggleMusic()">bấm vào 1 trong các nút trên nhé</div>

</div>

<audio id="bgmusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
function toggleMusic(){
    let music=document.getElementById("bgmusic");
    if(music.paused){music.play();}
    else{music.pause();}
}

/* Neon Particles */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<80;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        radius:Math.random()*2,
        dx:(Math.random()-0.5),
        dy:(Math.random()-0.5)
    });
}

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="rgba(0,255,255,0.6)";
    particles.forEach(p=>{
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
        ctx.fill();
        p.x+=p.dx;
        p.y+=p.dy;
        if(p.x<0||p.x>canvas.width)p.dx*=-1;
        if(p.y<0||p.y>canvas.height)p.dy*=-1;
    });
    requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
